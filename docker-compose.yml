services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: spotify_faq_backend
    ports:
      - "8000:8000"
    environment:
      # Nome do serviço "ollama", não "localhost" — dentro da rede do
      # compose, o Docker resolve esse nome para o IP interno do container.
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    depends_on:
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - faq_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: spotify_faq_frontend
    ports:
      - "8501:8501"
    environment:
      # Idem: "backend" é o nome do serviço, resolvido internamente.
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - faq_network

volumes:
  ollama_data:

networks:
  faq_network:
    driver: bridge